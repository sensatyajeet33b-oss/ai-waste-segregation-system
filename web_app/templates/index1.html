<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrashScan AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ── Reset & Vars ──────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0A0C0F;
      --surface: #111318;
      --border: #1E222A;
      --text: #E8EAF0;
      --muted: #5A6070;
      --wet: #3B82F6;
      --dry: #F97316;
      --accent: #22D3EE;
      --radius: 12px;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid noise overlay ─────────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, .03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--wet));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Mode Toggle ─────────────────────────────────────────────────────────── */
    .mode-toggle {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
    }

    .mode-btn {
      padding: .5rem 1.25rem;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 50px;
      font-family: var(--font-display);
      font-size: .85rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      transition: all .25s ease;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* ── Main card ───────────────────────────────────────────────────────────── */
    .card {
      backdrop-filter: blur(12px);
      background: rgba(17, 19, 24, 0.7);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    /* ── Upload zone ─────────────────────────────────────────────────────────── */
    .upload-zone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      padding: 2.5rem;
      border: 2px dashed var(--border);
      border-radius: 16px;
      margin: 1.5rem;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      text-align: center;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(34, 211, 238, .04);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      filter: grayscale(1) opacity(.5);
      transition: filter .2s;
    }

    .upload-zone:hover .upload-icon {
      filter: none;
    }

    .upload-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }

    .upload-sub {
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--muted);
    }

    /* Preview inside upload zone */
    .preview-img {
      max-height: 220px;
      max-width: 100%;
      border-radius: 10px;
      object-fit: contain;
      display: none;
    }

    /* ── Analyse button ──────────────────────────────────────────────────────── */
    .btn-row {
      padding: 0 1.5rem 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn-analyse {
      flex: 1;
      padding: .85rem 2rem;
      background: var(--accent);
      color: #000;
      border: none;
      outline: none;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      letter-spacing: .02em;
      transition: opacity .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .btn-analyse:hover {
      opacity: .85;
    }

    .btn-analyse:active {
      transform: scale(.98);
    }

    .btn-analyse:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .btn-clear {
      padding: .85rem 1.4rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: .9rem;
      font-weight: 600;
      border-radius: 50px;
      transition: border-color .2s, color .2s;
    }

    .btn-clear:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* ── Loader ──────────────────────────────────────────────────────────────── */
    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 3rem;
      text-align: center;
    }

    .loader.active {
      display: flex;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      font-family: var(--font-mono);
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .06em;
    }

    /* ── Results ─────────────────────────────────────────────────────────────── */
    .results {
      display: none;
      padding: 1.5rem;
      animation: fadeUp .4s ease;
    }

    .results.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .results-title {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .results-count {
      font-family: var(--font-mono);
      font-size: .75rem;
      background: var(--border);
      padding: .2rem .6rem;
      border-radius: 50px;
      color: var(--muted);
    }

    /* ── Single classify result ──────────────────────────────────────────────── */
    .cls-result {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
    }

    .cls-badge {
      min-width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      flex-shrink: 0;
    }

    .cls-badge .badge-conf {
      font-size: .65rem;
      font-weight: 500;
      font-family: var(--font-mono);
      margin-top: 2px;
      opacity: .75;
    }

    .cls-breakdown {
      flex: 1;
    }

    .cls-breakdown-title {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .75rem;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .5rem;
    }

    .bar-label {
      font-family: var(--font-mono);
      font-size: .75rem;
      width: 60px;
      flex-shrink: 0;
      text-transform: capitalize;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .5s ease;
    }

    .bar-pct {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--muted);
      width: 40px;
      text-align: right;
    }

    /* ── Detection results ───────────────────────────────────────────────────── */
    .det-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 640px) {
      .det-grid {
        grid-template-columns: 1fr;
      }
    }

    .annotated-wrap {
      grid-column: 1 / -1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .annotated-wrap img {
      width: 100%;
      display: block;
    }

    .det-objects-title {
      grid-column: 1 / -1;
      font-family: var(--font-mono);
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .det-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      gap: .85rem;
      align-items: flex-start;
      transition: border-color .2s;
      animation: fadeUp .3s ease both;
    }

    .det-card:hover {
      border-color: var(--muted);
    }

    .det-crop {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .det-info {
      flex: 1;
      min-width: 0;
    }

    /* .det-obj-label {
      font-size: .8rem;
      font-weight: 700;
      text-transform: capitalize;
      margin-bottom: .2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    } */

    .det-cls-chip {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-family: var(--font-mono);
      font-size: .7rem;
      font-weight: 500;
      padding: .2rem .55rem;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .4rem;
    }

    .det-chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .det-confs {
      font-family: var(--font-mono);
      font-size: .65rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Summary strip ───────────────────────────────────────────────────────── */
    .summary-strip {
      grid-column: 1 / -1;
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      margin-top: .25rem;
    }

    .summary-pill {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-family: var(--font-mono);
      font-size: .72rem;
      padding: .35rem .85rem;
      border-radius: 50px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .summary-pill b {
      color: var(--text);
    }

    /* ── Error ───────────────────────────────────────────────────────────────── */
    .error-box {
      display: none;
      padding: 1rem 1.5rem;
      background: rgba(239, 68, 68, .08);
      border: 1px solid rgba(239, 68, 68, .3);
      border-radius: 10px;
      margin: 1rem 1.5rem;
      font-family: var(--font-mono);
      font-size: .8rem;
      color: #EF4444;
    }

    .error-box.active {
      display: block;
    }

    /* ── Mode description ────────────────────────────────────────────────────── */
    .mode-desc {
      padding: 1rem 1.5rem 0;
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .mode-desc span {
      color: var(--accent);
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">🗑️</div>
        <div>
          <div class="logo-text">Trash<span>Scan</span></div>
          <div class="tagline">AI Waste Classifier</div>
        </div>
      </div>

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-single" onclick="setMode('single')">
          Single Object
        </button>
        <button class="mode-btn" id="btn-multi" onclick="setMode('multi')">
          Multi Object
        </button>
      </div>
    </header>

    <!-- Main card -->
    <div class="card">

      <!-- Mode description -->
      <p class="mode-desc" id="mode-desc">
        <span>Single mode:</span> Upload one image — the classifier directly determines if it's <span>wet</span> or
        <span>dry</span> waste.
      </p>

      <!-- Upload zone -->
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)" />
        <div id="upload-placeholder">
          <div class="upload-icon">📷</div>
          <div class="upload-title">Drop image here or click to browse</div>
          <div class="upload-sub">PNG · JPG · WEBP · up to 16 MB</div>
        </div>
        <img id="preview-img" class="preview-img" alt="preview" />
      </div>

      <!-- Error -->
      <div class="error-box" id="error-box"></div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn-analyse" id="btn-analyse" disabled onclick="analyse()">
          <span>⚡</span> Analyse
        </button>
        <button class="btn-clear" onclick="clearAll()">Clear</button>
      </div>

      <!-- Loader -->
      <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loader-text">Initialising model…</div>
      </div>

      <!-- Results -->
      <div class="results" id="results"></div>

    </div><!-- /card -->

  </div><!-- /wrapper -->

  <script>
    // ── State ─────────────────────────────────────────────────────────────────────
    let currentMode = 'single';
    let currentFile = null;

    // ── Mode switch ───────────────────────────────────────────────────────────────
    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btn-single').classList.toggle('active', mode === 'single');
      document.getElementById('btn-multi').classList.toggle('active', mode === 'multi');

      const desc = document.getElementById('mode-desc');
      if (mode === 'single') {
        desc.innerHTML = '<span>Single mode:</span> Upload one image — the classifier directly determines if it\'s <span>wet</span> or <span>dry</span> waste.';
      } else {
        desc.innerHTML = '<span>Multi mode:</span> The detector finds every object, crops each one, then the classifier labels each crop as <span>wet</span> or <span>dry</span>.';
      }
      clearResults();
    }

    // ── File handling ─────────────────────────────────────────────────────────────
    function handleFile(input) {
      if (!input.files.length) return;
      currentFile = input.files[0];

      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('preview-img');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('upload-placeholder').style.display = 'none';
      };
      reader.readAsDataURL(currentFile);

      document.getElementById('btn-analyse').disabled = false;
      clearResults();
    }

    // Drag & drop
    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      currentFile = file;
      const fi = document.getElementById('file-input');
      const dt = new DataTransfer(); dt.items.add(file);
      fi.files = dt.files;
      handleFile(fi);
    });

    // ── Analyse ───────────────────────────────────────────────────────────────────
    async function analyse() {
      if (!currentFile) return;

      showLoader(true);
      clearResults();
      hideError();

      const fd = new FormData();
      fd.append('image', currentFile);

      const endpoint = currentMode === 'single' ? '/classify' : '/detect';

      try {
        const res = await fetch(endpoint, { method: 'POST', body: fd });
        const data = await res.json();

        if (data.error) { showError(data.error); return; }

        if (currentMode === 'single') renderClassify(data);
        else renderDetect(data);

      } catch (err) {
        showError('Network error: ' + err.message);
      } finally {
        showLoader(false);
      }
    }

    // ── Render: Single classify ───────────────────────────────────────────────────
    function renderClassify(data) {
      const color = data.color || '#888';
      const pct = Math.round(data.confidence * 100);

      const top5HTML = (data.top5 || []).map(item => {
        const barColor = item.label === 'wet' ? 'var(--wet)' : 'var(--dry)';
        const w = Math.round(item.confidence * 100);
        return `
      <div class="bar-row">
        <div class="bar-label">${item.label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${w}%;background:${barColor}"></div>
        </div>
        <div class="bar-pct">${w}%</div>
      </div>`;
      }).join('');

      document.getElementById('results').innerHTML = `
    <div class="results-header">
      <div class="results-title">Classification Result</div>
    </div>
    <div class="cls-result">
      <div class="cls-badge" style="background:${color}22;color:${color};border:2px solid ${color}44">
        ${data.label}
        <div class="badge-conf">${pct}%</div>
      </div>
      <div class="cls-breakdown">
        <div class="cls-breakdown-title">Confidence Breakdown</div>
        ${top5HTML}
      </div>
    </div>
  `;
      showResults();
    }

    // ── Render: Multi detect ──────────────────────────────────────────────────────
    function renderDetect(data) {
      const wetCount = data.detections.filter(d => d.cls_label === 'wet').length;
      const dryCount = data.detections.filter(d => d.cls_label === 'dry').length;

      const cardsHTML = data.detections.map((det, idx) => {
        const chipBg = det.cls_label === 'wet' ? 'rgba(59,130,246,.15)' : 'rgba(249,115,22,.15)';
        const chipCol = det.cls_label === 'wet' ? 'var(--wet)' : 'var(--dry)';
        return `
      <div class="det-card" style="animation-delay:${idx * 60}ms">
        <img class="det-crop" src="${det.crop_b64}" alt="crop ${det.id}" />
        <div class="det-info">
          <div class="det-cls-chip" style="background:${chipBg};color:${chipCol}">
            <span class="det-chip-dot" style="background:${chipCol}"></span>
            ${det.cls_label} waste
          </div>
          <div class="det-confs">
            Det conf: ${Math.round(det.det_conf * 100)}%<br>
            Cls conf: ${Math.round(det.cls_conf * 100)}%
          </div>
        </div>
      </div>`;
      }).join('');

      const noDetHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-family:var(--font-mono);font-size:.8rem;">
      No objects detected. Try a clearer image.
    </div>`;

      document.getElementById('results').innerHTML = `
    <div class="results-header">
      <div class="results-title">Detection Results</div>
      <div class="results-count">${data.total} object${data.total !== 1 ? 's' : ''}</div>
    </div>

    <div class="det-grid">

      <div class="annotated-wrap">
        <img src="${data.annotated_image}" alt="annotated" />
      </div>

      ${data.total > 0 ? `
        <div class="summary-strip">
          <div class="summary-pill">
            <span style="color:var(--wet)">●</span> Wet: <b>${wetCount}</b>
          </div>
          <div class="summary-pill">
            <span style="color:var(--dry)">●</span> Dry: <b>${dryCount}</b>
          </div>
          <div class="summary-pill">Total: <b>${data.total}</b></div>
        </div>

        <div class="det-objects-title">Detected Objects</div>
        ${cardsHTML}
      ` : noDetHTML}

    </div>
  `;
      showResults();
    }

    // ── UI helpers ────────────────────────────────────────────────────────────────
    const loaderTexts = [
      'Loading model…', 'Running inference…', 'Analysing pixels…', 'Almost done…'
    ];
    let loaderInterval;

    function showLoader(show) {
      const el = document.getElementById('loader');
      el.classList.toggle('active', show);
      document.getElementById('btn-analyse').disabled = show;

      if (show) {
        let i = 0;
        document.getElementById('loader-text').textContent = loaderTexts[0];
        loaderInterval = setInterval(() => {
          i = (i + 1) % loaderTexts.length;
          document.getElementById('loader-text').textContent = loaderTexts[i];
        }, 1200);
      } else {
        clearInterval(loaderInterval);
      }
    }

    function showResults() {
      const el = document.getElementById('results');
      el.classList.add('active');
    }

    function clearResults() {
      const el = document.getElementById('results');
      el.classList.remove('active');
      el.innerHTML = '';
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = '⚠ ' + msg;
      el.classList.add('active');
    }

    function hideError() {
      document.getElementById('error-box').classList.remove('active');
    }

    function clearAll() {
      currentFile = null;
      document.getElementById('file-input').value = '';
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('upload-placeholder').style.display = 'block';
      document.getElementById('btn-analyse').disabled = true;
      clearResults();
      hideError();
    }
  </script>
</body>

</html>
